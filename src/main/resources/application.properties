spring.application.name=demo1

# H2 (development) datasource for quick testing
spring.datasource.url=jdbc:h2:mem:demo1;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.sql.init.mode=always

# iDMA configuration (disabled by default)
# Enable iDMA backed store by setting idma.enabled=true and providing credentials/endpoint
idma.enabled=false
idma.endpoint=
# idma.auth.type=aksk|token
# idma.auth.ak=
# idma.auth.sk=
# idma.auth.token=

# connection and retry defaults
idma.timeout.connect-ms=5000
idma.timeout.read-ms=10000
idma.retry.max-attempts=3
idma.retry.backoff-ms=200
